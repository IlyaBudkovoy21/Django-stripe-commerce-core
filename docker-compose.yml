services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DJANGO_ENV: production
      DEBUG: "False"
      SECRET_KEY: docker-insecure-secret-key-change-me
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: stripe_core
      DATABASE_USER: stripe_core
      DATABASE_PASSWORD: stripe_core
      DATABASE_HOST: db
      DATABASE_PORT: "5432"
      APP_BASE_URL: http://localhost:8000
      ALLOWED_HOSTS: 127.0.0.1,localhost
      SECURE_SSL_REDIRECT: "False"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/')"]
      interval: 15s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stripe_core
      POSTGRES_USER: stripe_core
      POSTGRES_PASSWORD: stripe_core
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stripe_core -d stripe_core"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
